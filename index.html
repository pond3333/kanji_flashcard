<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>漢字 Flashcard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --text:    #000000;
  --dim:     #555555;
  --border:  #000000;
  --border2: #cccccc;
  --border3: #eeeeee;
  --surface: #f5f5f5;
  --hover:   #f0f0f0;
}
[data-theme="dark"] {
  --bg:      #111111;
  --text:    #e8e8e8;
  --dim:     #999999;
  --border:  #e8e8e8;
  --border2: #444444;
  --border3: #2a2a2a;
  --surface: #1e1e1e;
  --hover:   #2a2a2a;
}

body { font-family: sans-serif; background: var(--bg); color: var(--text); transition: background .2s, color .2s; }

.screen { display: none; padding: 12px; min-height: 100dvh; }
.screen.active { display: flex; flex-direction: column; }

/* ── Dark mode toggle ── */
#dark-toggle {
  position: fixed; top: 12px; right: 12px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  padding: 4px 10px; cursor: pointer; font-size: 0.82rem; z-index: 999;
}
#dark-toggle:hover { background: var(--hover); }

/* ── Home ── */
#screen-home { align-items: center; justify-content: center; gap: 20px; padding-bottom: 0; }
#screen-home h1 { font-size: 2.5rem; }
#screen-home .subtitle { color: var(--dim); font-size: 0.9rem; }
.home-btn {
  width: 100%; max-width: 320px; padding: 16px;
  font-size: 1.1rem; border: 2px solid var(--border);
  background: var(--bg); color: var(--text); cursor: pointer;
}
.home-btn:hover { background: var(--hover); }

/* Footer */
#home-footer {
  width: 100%; max-width: 320px;
  margin-top: 12px;
  border-top: 1px solid var(--border2);
  padding-top: 14px;
  font-size: 0.78rem;
  color: var(--dim);
}
#home-footer .footer-title {
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: var(--text);
}
#home-footer ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
#home-footer li::before { content: '— '; }

/* ── Plan ── */
#screen-plan { gap: 0; }
.screen-header {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.screen-header h2 { font-size: 1.1rem; }
.btn-back {
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  padding: 4px 10px; cursor: pointer; font-size: 0.85rem; white-space: nowrap;
}
.btn-back:hover { background: var(--hover); }

.plan-section-title {
  font-weight: bold; font-size: 0.85rem;
  padding: 6px 0; border-bottom: 1px solid var(--border2); margin-bottom: 6px;
  color: var(--text);
}
.cardset-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 10px 12px; border: 1px solid var(--border2);
  background: var(--bg); color: var(--text); cursor: pointer;
  margin-bottom: 6px; font-size: 0.9rem; text-align: left;
}
.cardset-btn:hover { background: var(--hover); }
.cs-label { font-weight: bold; }
.cs-info  { font-size: 0.78rem; color: var(--dim); }

/* ── Study ── */
#screen-study { gap: 10px; }

#section-a {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
#study-title    { font-weight: bold; font-size: 0.9rem; }
#study-progress { font-size: 0.85rem; }

#section-b { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 50vh; }

#left-col {
  display: flex; flex-direction: column; justify-content: space-between;
  border: 1px solid var(--border); padding: 12px;
}
#kanji-display {
  font-size: 96px; line-height: 1; text-align: center; flex: 1;
  display: flex; align-items: center; justify-content: center;
}
#readings {
  border-top: 1px solid var(--border2); padding-top: 8px;
  font-size: 1rem; display: flex; flex-direction: column; gap: 4px;
}
#readings .row   { display: flex; gap: 8px; }
#readings .label { font-weight: bold; min-width: 60px; }

#right-col { border: 1px solid var(--border); padding: 12px; font-size: 1rem; overflow-y: auto; }
.ex-title {
  font-weight: bold; margin-bottom: 8px;
  border-bottom: 1px solid var(--border2); padding-bottom: 4px;
}
.example {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 6px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--border3);
}
.example:last-child { border-bottom: none; }
.ex-word    { font-size: 1.1rem; }
.ex-reading { font-size: 0.85rem; color: var(--dim); }
.ex-korean  { font-size: 0.95rem; text-align: right; }

#examples.hide-kanji  .ex-word    { visibility: hidden; }
#examples.hide-answer .ex-reading { visibility: hidden; }
#examples.hide-answer .ex-korean  { visibility: hidden; }

/* Section C */
#section-c {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto;
  gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
}
#section-c button {
  padding: 16px 10px; font-size: 1rem;
  border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer;
}
#section-c button:hover:not(:disabled) { background: var(--hover); }
#btn-next { grid-column: 1 / -1; }

.hidden { visibility: hidden; }
</style>
</head>
<body>

<button id="dark-toggle" onclick="toggleDark()">다크모드</button>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <h1>漢字</h1>
  <p class="subtitle">2136개 한자 플래시카드</p>
  <button class="home-btn" onclick="openPlan('ganada')">가나다 순 ㄱ→ㅎ</button>
  <button class="home-btn" onclick="openPlan('jlpt')">JLPT 순 N5→N1</button>

  <div id="home-footer">
    <div class="footer-title">공지사항</div>
    <ul id="notices-list"></ul>
  </div>
</div>

<!-- PLAN -->
<div id="screen-plan" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('home')">← 홈</button>
    <h2 id="plan-title"></h2>
  </div>
  <div id="plan-list" style="overflow-y:auto; flex:1;"></div>
</div>

<!-- STUDY -->
<div id="screen-study" class="screen">
  <div id="section-a">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-back" onclick="showScreen('plan')">← 목록</button>
      <span id="study-title"></span>
    </div>
    <span id="study-progress" style="text-align:center;"></span>
    <div></div>
  </div>

  <div id="section-b">
    <div id="left-col">
      <div id="kanji-display"></div>
      <div id="readings" class="hidden">
        <div class="row"><span class="label">音読み</span><span id="r-onyomi"></span></div>
        <div class="row"><span class="label">訓読み</span><span id="r-kunyomi"></span></div>
        <div class="row"><span class="label">한국어</span><span id="r-korean"></span><span id="r-index" style="margin-left:auto;font-size:0.78rem;color:var(--dim);"></span></div>
      </div>
    </div>
    <div id="right-col">
      <div class="ex-title">예문</div>
      <div id="examples" class="hide-kanji hide-answer"></div>
    </div>
  </div>

  <div id="section-c">
    <button id="btn-examples" onclick="toggleExamples()">예문 보기</button>
    <button id="btn-toggle"   onclick="toggleReveal()">정답 보기</button>
    <button id="btn-next"     onclick="nextCard()">다음 →</button>
  </div>
</div>

const CONSONANTS = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const CONSONANT_MERGE = { 'ㄲ': 'ㄱ', 'ㅆ': 'ㅅ' };

function initialConsonant(str) {
  if (!str) return '?';
  const code = str.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return str[0];
  const c = CONSONANTS[Math.floor(code / (21 * 28))];
  return CONSONANT_MERGE[c] || c;
}
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('dark-toggle').textContent = dark ? '다크모드' : '라이트모드';
  try { localStorage.setItem('fc_theme', dark ? 'light' : 'dark'); } catch(e) {}
}
(function() {
  try {
    const saved = localStorage.getItem('fc_theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('dark-toggle').textContent = '라이트모드';
    }
  } catch(e) {}
})();

// ── Notices ───────────────────────────────────────────────────────────────────
document.getElementById('notices-list').innerHTML =
  NOTICES.map(n => `<li>${n}</li>`).join('');

// ── Plans ─────────────────────────────────────────────────────────────────────
function buildGanadaPlan() {
  const sorted = [...CARDS].sort((a, b) => (a.r || a.k).localeCompare(b.r || b.k, 'ko'));
  const groups = {}, groupOrder = [];
  for (const card of sorted) {
    const c = initialConsonant(card.r || '');
    if (!groups[c]) { groups[c] = []; groupOrder.push(c); }
    groups[c].push(card);
  }
  const sets = [];
  for (const label of groupOrder) {
    const chunks = chunk(groups[label], 50);
    chunks.forEach((ch, i) =>
      sets.push({ label: `${label} (${i+1}/${chunks.length})`, group: label, cards: ch })
    );
  }
  return { title: '가나다 순', sets };
}
function buildJlptPlan() {
  const ORDER = ['N5','N4','N3','N2','N1'];
  const groups = { N5:[], N4:[], N3:[], N2:[], N1:[] };
  for (const card of CARDS) { if (groups[card.j]) groups[card.j].push(card); }
  const sets = [];
  for (const level of ORDER) {
    const chunks = chunk(groups[level], 50);
    chunks.forEach((ch, i) =>
      sets.push({ label: `${level} (${i+1}/${chunks.length})`, group: level, cards: ch })
    );
  }
  return { title: 'JLPT 순', sets };
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentPlan = null, currentPlanId = '', currentSetIdx = 0;
let currentCardIdx = 0, shuffledCards = [];
let kanjiShown = false, allShown = false;

function openPlan(planId) {
  currentPlanId = planId;
  currentPlan   = planId === 'ganada' ? buildGanadaPlan() : buildJlptPlan();
  document.getElementById('plan-title').textContent = currentPlan.title;
  const list = document.getElementById('plan-list');
  list.innerHTML = '';
  let lastGroup = null;
  currentPlan.sets.forEach((set, idx) => {
    if (set.group !== lastGroup) {
      lastGroup = set.group;
      const t = document.createElement('div');
      t.className = 'plan-section-title';
      t.textContent = set.group;
      list.appendChild(t);
    }
    const btn = document.createElement('button');
    btn.className = 'cardset-btn';
    btn.innerHTML = `<div><div class="cs-label">${set.label}</div><div class="cs-info">${set.cards.length}장</div></div>`;
    btn.onclick = () => openStudy(idx);
    list.appendChild(btn);
  });
  showScreen('plan');
}

function openStudy(setIdx) {
  currentSetIdx  = setIdx;
  currentCardIdx = 0;
  shuffledCards  = shuffle(currentPlan.sets[setIdx].cards);
  showScreen('study');
  renderCard();
}

function renderCard() {
  const set  = currentPlan.sets[currentSetIdx];
  const card = shuffledCards[currentCardIdx];
  document.getElementById('study-title').textContent    = set.label;
  document.getElementById('study-progress').textContent = `${currentCardIdx + 1} / ${shuffledCards.length}`;
  document.getElementById('kanji-display').textContent  = card.k;
  document.getElementById('r-onyomi').textContent       = card.o || '—';
  document.getElementById('r-kunyomi').textContent      = card.u || '—';
  document.getElementById('r-korean').textContent       =
    (card.m && card.r) ? `${card.m} ${card.r}` : (card.m || card.r || '—');
  document.getElementById('r-index').textContent        = '#' + String(card.i).padStart(4, '0');
  document.getElementById('examples').innerHTML = card.e.slice(0, 5).map(([w, r, k]) => `
    <div class="example">
      <div><div class="ex-word">${w}</div><div class="ex-reading">${r}</div></div>
      <div></div>
      <div class="ex-korean">${k}</div>
    </div>`).join('');
  kanjiShown = false; allShown = false;
  renderButtons();
  renderNextBtn();
}

function renderButtons() {
  const ex    = document.getElementById('examples');
  const btnEx = document.getElementById('btn-examples');
  const btnTg = document.getElementById('btn-toggle');
  ex.classList.toggle('hide-kanji',  !kanjiShown && !allShown);
  ex.classList.toggle('hide-answer', !allShown);
  document.getElementById('readings').classList.toggle('hidden', !allShown);
  btnEx.disabled      = allShown;
  btnEx.style.opacity = allShown ? '0.35' : '1';
  btnEx.style.cursor  = allShown ? 'default' : 'pointer';
  btnEx.textContent   = kanjiShown ? '예문 숨기기' : '예문 보기';
  btnTg.textContent   = allShown   ? '정답 숨기기' : '정답 보기';
}

function toggleExamples() { kanjiShown = !kanjiShown; renderButtons(); }
function toggleReveal()    { allShown = !allShown; if (!allShown) kanjiShown = false; renderButtons(); }
function nextCard() {
  if (currentCardIdx < shuffledCards.length - 1) {
    currentCardIdx++;
    renderCard();
  }
}

function renderNextBtn() {
  const btn = document.getElementById('btn-next');
  const last = currentCardIdx === shuffledCards.length - 1;
  btn.textContent = last ? '완료' : '다음 →';
  btn.disabled    = last;
  btn.style.opacity = last ? '0.4' : '1';
  btn.style.cursor  = last ? 'default' : 'pointer';
}
</script>
